services:
  backend:
    build:
      context: ./backend
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=CRM API
      - APP_VERSION=1.0.0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./data/crm.db
      - DATABASE_URL_SYNC=sqlite:///./data/crm.db
    volumes:
      - crm-data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  crm-data:
