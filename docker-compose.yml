services:
  backend:
    build:
      context: ./backend
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "8765:8000"
    environment:
      - APP_NAME=CRM API
      - APP_VERSION=1.0.0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./data/crm.db
      - DATABASE_URL_SYNC=sqlite:///./data/crm.db
    volumes:
      - crm-data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "8766:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm-frontend.rule=Host(`w6582fhc977otozkig5o47t9.58.136.57.50.sslip.io`)"
      - "traefik.http.services.crm-frontend.loadbalancer.server.port=80"
    depends_on:
      - backend

volumes:
  crm-data:
